name: Discount Alert Bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MIN_DISCOUNT: ${{ secrets.MIN_DISCOUNT }}
          MAX_ALERTS_PER_RUN: ${{ secrets.MAX_ALERTS_PER_RUN }}
          REQUEST_TIMEOUT: ${{ secrets.REQUEST_TIMEOUT }}
          REQUEST_RETRIES: ${{ secrets.REQUEST_RETRIES }}
          REQUIRE_IN_STOCK: ${{ secrets.REQUIRE_IN_STOCK }}
        run: python main.py
